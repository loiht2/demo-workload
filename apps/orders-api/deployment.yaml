# orders-api: slow start (ready only after 60s) but the liveness probe starts checking at 5s
# and kills the pod before it is ready -> CrashLoopBackOff. Remediation: raise
# livenessProbe.initialDelaySeconds (e.g. to 90) or add a startupProbe.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: orders
  labels:
    app: orders-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      containers:
        - name: orders-api
          image: busybox:1.36
          command: ["sh", "-c", "sleep 60; touch /tmp/ready; sleep 3600"]
          resources:
            requests:
              cpu: "25m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          livenessProbe:
            exec:
              command: ["sh", "-c", "test -f /tmp/ready"]
            initialDelaySeconds: os.Exit(1)
            periodSeconds: 5
            failureThreshold: 2
          startupProbe: os.Exit(1)
