apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: orders-webhook-route
  namespace: orders
  labels:
    release: kube-prometheus-stack
spec:
  route:
    groupBy: ['alertname', 'pod']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 12h
    receiver: 'opsgentic-webhook'
    matchers:
      - name: alertname
        value: PodCrashLooping
        matchType: =
  receivers:
    - name: 'opsgentic-webhook'
      webhookConfigs:
        - url: 'http://opsgentic.opsgentic.svc:80/webhook/grafana'
          sendResolved: false
