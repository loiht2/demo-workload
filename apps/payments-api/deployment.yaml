# Demo workload for opsgentic.
#
# This pod intentionally runs close to its memory limit so the HighPodMemory
# alert fires. It is the remediation TARGET: opsgentic opens a PR proposing to
# raise resources.limits.memory here (e.g. 64Mi -> 256Mi).
#
# The container is a memory-pressure simulator (polinux/stress); it allocates
# ~50Mi against a 64Mi limit (~80%). It does not serve HTTP — the Service is a
# placeholder to mirror a real app's manifest set.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
  labels:
    app: payments-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      containers:
        - name: payments-api
          image: polinux/stress:latest
          command: ["stress"]
          args: ["--vm", "1", "--vm-bytes", "50M", "--vm-hang", "1"]
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"          # remediation: raise this (e.g. 256Mi)
          livenessProbe:
            exec:
              command: ["pgrep", "stress"]
            initialDelaySeconds: 5
            periodSeconds: 15
